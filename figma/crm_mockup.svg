<svg width="1440" height="900" viewBox="0 0 1440 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Global Canvas Background -->
  <rect width="1440" height="900" fill="#0A2218" />

  <!-- SIDEBAR CONTAINER -->
  <g id="Sidebar" name="Sidebar">
    <rect width="240" height="900" fill="#061810" stroke="#1A3828" stroke-width="1" />
    <g id="Sidebar-Logo" name="Logo">
      <text x="24" y="40" font-family="Barlow Condensed, Inter, sans-serif" font-size="22" font-weight="800" fill="#EFF6F2">Wa<tspan fill="#1FE88A">Bot</tspan>.ai</text>
    </g>
    <g id="Sidebar-Nav-Items" name="Navigation Items">
      <text x="24" y="90" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#7FA897" letter-spacing="1">PLATFORM</text>
      <g id="Nav-Dashboard" name="Dashboard" cursor="pointer">
        <text x="60" y="136" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#7FA897">Dashboard</text>
      </g>
      <g id="Nav-Inbox" name="Inbox" cursor="pointer">
        <text x="60" y="176" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#7FA897">Inbox</text>
      </g>
      <g id="Nav-AI-Builder" name="AI Builder" cursor="pointer">
        <text x="60" y="216" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#7FA897">AI Builder</text>
      </g>
      <g id="Nav-Analytics" name="Analytics" cursor="pointer">
        <text x="60" y="256" font-family="Inter, sans-serif" font-size="13" font-weight="400" fill="#7FA897">Analytics</text>
      </g>
      <g id="Nav-CRM" name="CRM (Active)" cursor="pointer">
        <rect x="16" y="272" width="208" height="40" rx="8" fill="#1FE88A" fill-opacity="0.08" />
        <text x="60" y="296" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">CRM</text>
      </g>
    </g>
    <g id="Sidebar-Footer" name="User Profile">
      <rect x="0" y="820" width="240" height="80" fill="#061810" stroke="#1A3828" />
      <circle cx="40" cy="860" r="16" fill="#1FE88A" fill-opacity="0.12" />
      <text x="35" y="865" font-family="Barlow Condensed, sans-serif" font-size="14" font-weight="800" fill="#1FE88A">Y</text>
      <text x="68" y="855" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">Yasir Sheikh</text>
      <text x="68" y="870" font-family="Inter, sans-serif" font-size="11" fill="#7FA897">Founder · Growth</text>
    </g>
  </g>

  <!-- TOPBAR CONTAINER -->
  <g id="Topbar" name="Topbar">
    <rect x="240" y="0" width="1200" height="64" fill="#0A2218" stroke="#1A3828" />
    <text x="264" y="36" font-family="Barlow Condensed, Inter, sans-serif" font-size="20" font-weight="800" fill="#EFF6F2">CRM</text>
    <text x="264" y="52" font-family="Inter, sans-serif" font-size="11" fill="#7FA897">Customer &amp; lead management</text>
  </g>

  <!-- CRM MAIN WORKSPACE -->
  <g id="CRM-Workspace" name="CRM Viewport">
    
    <!-- Title & Search Action Bar -->
    <g id="CRM-Action-Bar" name="CRM Actions">
      <text x="264" y="104" font-family="Barlow Condensed, Inter, sans-serif" font-size="28" font-weight="800" fill="#EFF6F2">Contacts Database</text>
      <text x="264" y="120" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">312 contacts · 89 hot leads</text>
      
      <!-- Search input -->
      <g id="Search-Input" name="Search box">
        <rect x="1000" y="84" width="220" height="36" rx="8" fill="#061810" stroke="#1A3828" />
        <text x="1032" y="106" font-family="Inter, sans-serif" font-size="13" fill="#7FA897">Search contacts...</text>
      </g>
      <!-- Add contact Btn -->
      <g id="Add-Btn" name="Add Contact Button" cursor="pointer">
        <rect x="1236" y="84" width="140" height="36" rx="8" fill="#1FE88A" />
        <text x="1306" y="106" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#061810" text-anchor="middle">+ Add contact</text>
      </g>
    </g>

    <!-- KPI STRIP -->
    <g id="CRM-KPI-Row" name="KPI Cards">
      <!-- Total Contacts Card -->
      <g id="KPI-Total" name="Total Contacts">
        <rect x="264" y="152" width="360" height="110" rx="16" fill="#0d2e20" stroke="#1A3828" />
        <text x="284" y="184" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">Total Contacts</text>
        <text x="284" y="224" font-family="Barlow Condensed, Inter, sans-serif" font-size="36" font-weight="800" fill="#EFF6F2">312</text>
      </g>
      
      <!-- Hot Leads Card -->
      <g id="KPI-Hot-Leads" name="Hot Leads">
        <rect x="640" y="152" width="360" height="110" rx="16" fill="#0d2e20" stroke="#1A3828" />
        <text x="660" y="184" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">Hot Leads</text>
        <text x="660" y="224" font-family="Barlow Condensed, Inter, sans-serif" font-size="36" font-weight="800" fill="#F59E0B">89</text>
      </g>

      <!-- Converted Card -->
      <g id="KPI-Converted" name="Converted Card">
        <rect x="1016" y="152" width="360" height="110" rx="16" fill="#0d2e20" stroke="#1A3828" />
        <text x="1036" y="184" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">Converted This Month</text>
        <text x="1036" y="224" font-family="Barlow Condensed, Inter, sans-serif" font-size="36" font-weight="800" fill="#1FE88A">34</text>
      </g>
    </g>

    <!-- CONTACTS TABLE DATA CARD -->
    <g id="CRM-Table-Card" name="Contacts Data Table">
      <rect x="264" y="286" width="1112" height="540" rx="16" fill="#0d2e20" stroke="#1A3828" />
      
      <!-- Table Filter Tabs Header -->
      <g id="Table-Filters" transform="translate(284, 302)">
        <rect width="50" height="26" rx="6" fill="#1FE88A" />
        <text x="25" y="17" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#061810" text-anchor="middle">All</text>

        <rect x="62" width="80" height="26" rx="6" fill="none" stroke="#1A3828" />
        <text x="102" y="17" font-family="Inter, sans-serif" font-size="11" fill="#7FA897" text-anchor="middle">Hot Leads</text>

        <rect x="154" width="84" height="26" rx="6" fill="none" stroke="#1A3828" />
        <text x="196" y="17" font-family="Inter, sans-serif" font-size="11" fill="#7FA897" text-anchor="middle">Customers</text>
      </g>

      <!-- Table Header Row -->
      <g id="Table-Header" transform="translate(264, 350)">
        <rect width="1112" height="40" fill="#061810" />
        <g font-family="Inter, sans-serif" font-size="11" font-weight="700" fill="#7FA897" letter-spacing="1">
          <text x="24" y="24">NAME</text>
          <text x="240" y="24">PHONE</text>
          <text x="440" y="24">STATUS</text>
          <text x="620" y="24">BUSINESS</text>
          <text x="780" y="24">BOOKINGS</text>
          <text x="920" y="24">LAST SEEN</text>
        </g>
      </g>

      <!-- Table Body Rows -->
      <g id="Table-Rows" transform="translate(264, 390)">
        <!-- Row 1 -->
        <g id="Row-1" transform="translate(0, 0)">
          <rect width="1112" height="56" fill="none" stroke="#1A3828" stroke-dasharray="0 0 1 0" />
          <circle cx="40" cy="28" r="14" fill="#1FE88A" fill-opacity="0.1" />
          <text x="36" y="32" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="800" fill="#1FE88A">P</text>
          <text x="68" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">Priya Meshram</text>
          <text x="240" y="32" font-family="Inter, sans-serif" font-size="13" fill="#7FA897">+91 98765 43210</text>
          <!-- Status Badge -->
          <rect x="440" y="16" width="76" height="22" rx="11" fill="#EF4444" fill-opacity="0.1" />
          <text x="478" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#EF4444" text-anchor="middle">Hot Lead</text>
          <!-- Business Tag -->
          <rect x="620" y="16" width="60" height="22" rx="6" fill="#3B82F6" fill-opacity="0.1" />
          <text x="650" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#3B82F6" text-anchor="middle">Clinic</text>
          <text x="780" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">3</text>
          <text x="920" y="32" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">Today</text>
        </g>

        <!-- Row 2 -->
        <g id="Row-2" transform="translate(0, 56)">
          <rect width="1112" height="56" fill="none" stroke="#1A3828" stroke-dasharray="0 0 1 0" />
          <circle cx="40" cy="28" r="14" fill="#3B82F6" fill-opacity="0.1" />
          <text x="36" y="32" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="800" fill="#3B82F6">R</text>
          <text x="68" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">Rahul Deshmukh</text>
          <text x="240" y="32" font-family="Inter, sans-serif" font-size="13" fill="#7FA897">+91 87654 32109</text>
          <rect x="440" y="16" width="76" height="22" rx="11" fill="#1FE88A" fill-opacity="0.1" />
          <text x="478" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#1FE88A" text-anchor="middle">Customer</text>
          <rect x="620" y="16" width="76" height="22" rx="6" fill="#3B82F6" fill-opacity="0.1" />
          <text x="658" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#3B82F6" text-anchor="middle">Coaching</text>
          <text x="780" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">1</text>
          <text x="920" y="32" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">Yesterday</text>
        </g>

        <!-- Row 3 -->
        <g id="Row-3" transform="translate(0, 112)">
          <rect width="1112" height="56" fill="none" stroke="#1A3828" stroke-dasharray="0 0 1 0" />
          <circle cx="40" cy="28" r="14" fill="#F59E0B" fill-opacity="0.1" />
          <text x="36" y="32" font-family="Barlow Condensed, sans-serif" font-size="12" font-weight="800" fill="#F59E0B">S</text>
          <text x="68" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">Sunita Agrawal</text>
          <text x="240" y="32" font-family="Inter, sans-serif" font-size="13" fill="#7FA897">+91 76543 21098</text>
          <rect x="440" y="16" width="76" height="22" rx="11" fill="#7FA897" fill-opacity="0.15" />
          <text x="478" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#7FA897" text-anchor="middle">Cold Lead</text>
          <rect x="620" y="16" width="60" height="22" rx="6" fill="#3B82F6" fill-opacity="0.1" />
          <text x="650" y="30" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#3B82F6" text-anchor="middle">Salon</text>
          <text x="780" y="32" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#EFF6F2">0</text>
          <text x="920" y="32" font-family="Inter, sans-serif" font-size="12" fill="#7FA897">3 days ago</text>
        </g>
      </g>
    </g>

  </g>
</svg>
